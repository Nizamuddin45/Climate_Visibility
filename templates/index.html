<!DOCTYPE html>
<html>
<head>
<title>Prediction</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #1d2671, #c33764);
    color: white;
}

.container {
    width: 420px;
    margin: 60px auto;
    padding: 30px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    backdrop-filter: blur(10px);
    text-align: center;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 22px;
    color: #00ffcc;
}
</style>

</head>

<body>

<div class="container">
    <h1>Prediction</h1>

    <form action="/predict" method="post">
        <input type="number" step="any" name="temp" placeholder="Temperature" required>
        <input type="number" step="any" name="humidity" placeholder="Humidity" required>
        <input type="number" step="any" name="wind_speed" placeholder="Wind Speed" required>
        <input type="number" step="any" name="wind_direction" placeholder="Wind Direction" required>
        <input type="number" step="any" name="pressure" placeholder="Pressure" required>

        <input type="datetime-local" name="datetime" required>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
